name: Test Hugging Face Access

on:
  workflow_dispatch:

jobs:
  test-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Test access via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])
          info = api.model_info("pyannote/speaker-diarization-community-1")
          print("Model access OK:", getattr(info, "id", getattr(info, "modelId", "unknown")))
          PY

      - name: Clone model via git with token in URL
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf test_model
          git clone https://__token__:${HF_TOKEN}@huggingface.co/pyannote/speaker-diarization-community-1 test_model

      - name: Verify files downloaded
        run: |
          echo "Listing files:"
          ls -lah test_model
