name: Transcribe and diarize audio

on:
  workflow_dispatch:
    inputs:
      audio_id:
        description: "ID del audio. Ejemplo: test001"
        required: true
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs
          git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install pinned torch stack
        run: |
          pip install \
            torch==2.3.1 \
            torchaudio==2.3.1 \
            torchvision==0.18.1

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt
          pip install \
            ctranslate2==4.4.0 \
            huggingface-hub==0.24.6 \
            pyannote.core \
            pyannote.database \
            pyannote.metrics \
            pyannote.pipeline \
            pytorch-lightning \
            lightning \
            speechbrain \
            lazy_loader

      - name: Validate input audio
        run: |
          test -f "inputs/${{ github.event.inputs.audio_id }}/${{ github.event.inputs.audio_id }}.mp3"

      # 🔥 CLAVE: descarga autenticada correcta
      - name: Download pyannote pipeline locally
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf /tmp/pyannote-speaker-diarization-community-1
          git clone https://__token__:${HF_TOKEN}@huggingface.co/pyannote/speaker-diarization-community-1 /tmp/pyannote-speaker-diarization-community-1

      - name: Inspect pyannote local files
        run: |
          echo "Contenido del directorio clonado:"
          ls -lah /tmp/pyannote-speaker-diarization-community-1
          echo
          echo "Buscando config.yaml:"
          test -f /tmp/pyannote-speaker-diarization-community-1/config.yaml          

      - name: Run pipeline
        env:
          HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
          PYANNOTE_PIPELINE_DIR: /tmp/pyannote-speaker-diarization-community-1
        run: |
          python -m src.main --audio-id "${{ github.event.inputs.audio_id }}"

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.event.inputs.audio_id }}
          path: inputs/${{ github.event.inputs.audio_id }}/outputs
          if-no-files-found: error
          retention-days: 14
