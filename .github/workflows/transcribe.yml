name: Transcribe and diarize audio

on:
  workflow_dispatch:
    inputs:
      audio_id:
        description: "ID del audio. Ejemplo: test001"
        required: true
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs
          git lfs install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install uv

      - name: Install project dependencies with uv
        run: |
          uv pip install --system -r requirements.txt

      - name: Validate input audio
        run: |
          test -f "inputs/${{ github.event.inputs.audio_id }}/${{ github.event.inputs.audio_id }}.mp3"

      - name: Download pyannote pipeline locally
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf /tmp/pyannote-speaker-diarization-community-1
          git clone https://__token__:${HF_TOKEN}@huggingface.co/pyannote/speaker-diarization-community-1 /tmp/pyannote-speaker-diarization-community-1

      - name: Inspect pyannote local files
        run: |
          echo "Contenido del directorio clonado:"
          ls -lah /tmp/pyannote-speaker-diarization-community-1

      - name: Debug versions
        run: |
          python - <<'PY'
          import sys
          import faster_whisper
          import pyannote.audio
          import soundfile
          import librosa
          import torchmetrics

          print("Python:", sys.version)
          print("faster-whisper:", getattr(faster_whisper, "__version__", "unknown"))
          print("pyannote.audio:", getattr(pyannote.audio, "__version__", "unknown"))
          print("torchmetrics:", torchmetrics.__version__)
          print("soundfile:", soundfile.__version__)
          print("librosa:", librosa.__version__)
          PY

      - name: Run pipeline
        env:
          HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
          PYANNOTE_PIPELINE_DIR: /tmp/pyannote-speaker-diarization-community-1
        run: |
          python -m src.main --audio-id "${{ github.event.inputs.audio_id }}"

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.event.inputs.audio_id }}
          path: inputs/${{ github.event.inputs.audio_id }}/outputs
          if-no-files-found: error
          retention-days: 14
