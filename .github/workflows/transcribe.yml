name: Transcribe and diarize audio

on:
  workflow_dispatch:
    inputs:
      audio_id:
        description: "ID del audio. Ejemplo: test001"
        required: true
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install pinned torch stack
        run: |
          pip install \
            torch==2.3.1 \
            torchaudio==2.3.1 \
            torchvision==0.18.1

      - name: Install base project dependencies
        run: |
          pip install --no-deps -r requirements.txt

      - name: Install WhisperX runtime dependencies
        run: |
          pip install \
            faster-whisper==1.0.3 \
            ctranslate2==4.4.0 \
            transformers==4.44.2 \
            tokenizers==0.19.1 \
            sentencepiece==0.2.0 \
            huggingface-hub==0.24.6 \
            accelerate==0.34.2 \
            einops==0.8.0 \
            nltk==3.9.1

      - name: Download NLTK data
        run: |
          python - <<'PY'
          import nltk
          nltk.download("punkt")
          nltk.download("punkt_tab")
          PY

      - name: Install pyannote runtime dependencies
        run: |
          pip install \
            pyannote.core \
            pyannote.database \
            pyannote.metrics \
            pyannote.pipeline \
            pytorch-lightning \
            lightning \
            speechbrain

      - name: Debug installed versions
        run: |
          python - <<'PY'
          import sys
          import torch
          import torchaudio
          import transformers
          print("Python:", sys.version)
          print("Torch:", torch.__version__)
          print("Torchaudio:", torchaudio.__version__)
          print("Has AudioMetaData:", hasattr(torchaudio, "AudioMetaData"))
          print("Transformers:", transformers.__version__)
          PY

      - name: Validate input audio
        run: |
          test -f "inputs/${{ github.event.inputs.audio_id }}/${{ github.event.inputs.audio_id }}.mp3"

      - name: Run pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m src.main --audio-id "${{ github.event.inputs.audio_id }}"

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.event.inputs.audio_id }}
          path: inputs/${{ github.event.inputs.audio_id }}/outputs
          if-no-files-found: error
          retention-days: 14
