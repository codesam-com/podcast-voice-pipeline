name: Transcribe and diarize audio

on:
  workflow_dispatch:
    inputs:
      audio_id:
        description: "ID del audio. Ejemplo: test001"
        required: true
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install CPU torch
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate input audio
        run: |
          test -f "inputs/${{ github.event.inputs.audio_id }}/${{ github.event.inputs.audio_id }}.mp3"

      - name: Run pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m src.main --audio-id "${{ github.event.inputs.audio_id }}"

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.event.inputs.audio_id }}
          path: inputs/${{ github.event.inputs.audio_id }}/outputs
          if-no-files-found: error
          retention-days: 14
